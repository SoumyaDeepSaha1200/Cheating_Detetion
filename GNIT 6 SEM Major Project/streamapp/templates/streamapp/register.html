<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institute of TechAdvance Institute</title>
    <script src="https://kit.fontawesome.com/96806cec91.js" crossorigin="anonymous"></script>
    <link rel="shortcut icon" href="/static/images/2023.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.5.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"> -->
</head>

<body>
    <div class="registration-box mt-5">
        <h2 class="fw-bold text-warning fs-1 text-center mt-3">
            Sign-Up</h2>

        <form class="container-fluid" id="registrationForm" method="POST" action="/register" enctype="multipart/form-data">{% csrf_token %}

            <div class="form-group">
                <label class="fw-bold" for="name" id="types">Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" class="form-control" required>
            </div>

            <div class="form-group mt-4" id="types">
                <label class="fw-bold" for="username">Username</label>
                <input type="text" placeholder="Enter your username" name="username" class="form-control text-dark"
                    required>
            </div>

            <div class="form-group mt-4" id="types">
                <label class="fw-bold" for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your Email id" class="form-control"
                    required>
            </div>

            <div class="form-group mt-4" id="types">
                <label class="fw-bold" for="password">Password</label>
                <input type="password" id="password" placeholder="Enter Password" name="password" class="form-control"
                    required>
            </div>

            <div class="form-group mt-4" id="types">
                <label class="fw-bold" for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Enter Confirm Password" name="repassword"
                    class="form-control" required>
            </div>

            <div class="form-group mt-4" id="types">
                <label class="fw-bold" for="age">Age</label>
                <input type="number" id="age" name="age" placeholder="Enter your Age" class="form-control" required>
            </div>

            <div class="form-group mt-4" id="types">
                <label class="fw-bold" for="dob">Date of Birth</label>
                <input type="date" id="dob" name="dob" class="form-control" required>
            </div>

            <div class="form-group mt-4" id="types">
                <label class="fw-bold" for="gender">Gender</label>
                <select id="gender" name="gender" class="form-select" required>
                    <option value="" class="text-dark">Select</option>
                    <option value="male" class="text-dark">Male</option>
                    <option value="female" class="text-dark">Female</option>
                    <option value="other" class="text-dark">Other</option>
                </select>
            </div>
            <div class="form-group mt-4" id="types">
                <label class="fw-bold" for="Upload Image">Image Upload</label>
                <input type="file" id="image" name="image" class="form-control" required>
            </div>





            <button type="submit" id="register"
                class="w-100 btn btn-danger mt-3 fs-5 fw-bold text-decoration-none border-none text-white">Submit</button>



            <!-- Change the href attribute to '/' for the login button -->
            <div style="text-align: center;"> <!-- Added to center the content -->

                <div class="fw-bold text-white mt-4 fs-5">
                    You already have an account?
                    <button onclick="location.href='/login'"
                        class="btn btn-link text-white fw-bold register-btn fs-5 btn-danger text-decoration-none btn-dark"
                        id="register2">
                        Login
                    </button>
                </div>
            </div>

            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} mt-4 alert-dismissible fade show text-center w-75 mx-auto"
                role="alert">
                <strong> {{ message }} </strong>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
            {% endif %}

        </form>

    </div>







    <style>
        #register {
            border: none;
            color: black !important;
            background-color: #e7e711 !important;
        }

        #register:hover {
            border: none;
            color: rgb(255, 255, 255) !important;
            background-color: rgb(231, 82, 7) !important;
        }

        #register2 {
            border: none;
            color: black !important;
            background-color: #e7e711 !important;
        }

        #register2:hover {
            border: none;
            color: rgb(255, 255, 255) !important;
            background-color: rgb(231, 41, 7) !important;
        }

        ::-webkit-scrollbar-track {
            width: 10px;
            background-color: #f1f1f1;
            /* Change the background color */
        }

        ::-webkit-scrollbar {
            width: 10px;
            /* Change the width of the scrollbar track */
        }

        ::-webkit-scrollbar-thumb {
            width: 10px;
            background-color: #888;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: #555;
        }

        #types {
            color: rgb(255, 255, 255) !important;
        }

        body {
            min-height: 150vh;
            background-image: url(/static/images/background\ 2.jpg);
            background-size: cover;
        }

        .registration-box {
            padding-top: 1cm !important;
            margin: auto;
            width: 40%;
            height: 140vh;
            /* border-radius: 30px; */
            background-color: rgba(0, 0, 0, 0.633);
            backdrop-filter: blur(10px);
            border: 5px solid;
            border-image: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet);
            border-image-slice: 1;
        }


        .registration-box h2 {
            font-size: 60px !important;
        }
    </style>







</body>

</html>
