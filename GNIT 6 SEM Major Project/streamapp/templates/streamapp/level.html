<!DOCTYPE html>
<html lang="en">

<head>
  <title>Institute of TechAdvance Institute</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.1/css/all.min.css"
    integrity="sha256-2XFplPlrFClt0bIdPgpz8H7ojnk10H69xRqd9+uTShA=" crossorigin="anonymous" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="shortcut icon" href="/static/images/2023.png" type="image/x-icon">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body>


















  <div class="container mt-5">
    <div class="column">
      <div class="col-md-9 mb-4 mx-auto">
        <div class="card">
          <a href="/startmock?sub={{ subject }}&type={{ type }}&diffucalty=0">
            <div class="card-body">
              <h5 class="card-title text-decoration-none border-none">Easy</h5>
              <p class="card-text text-decoration-none">This is an easy level task.</p>
            </div>
          </a>
        </div>
      </div>
      <div class="col-md-9 mb-4 mx-auto">
        <div class="card">
          <a href="/startmock?sub={{ subject }}&type={{ type }}&diffucalty=1">
            <div class="card-body">
              <h5 class="card-title text-decoration-none">Medium</h5>
              <p class="card-text text-decoration-none">This is a medium level task.</p>
            </div>
          </a>
        </div>
      </div>
      <div class="col-md-9 mb-4 mx-auto">
        <div class="card">
          <a href="/startmock?sub={{ subject }}&type={{ type }}&diffucalty=2">
            <div class="card-body">
              <h5 class="card-title text-decoration-none">Hard</h5>
              <p class="card-text text-decoration-none">This is a hard level task.</p>
            </div>
          </a>
        </div>
      </div>
    </div>
  </div>

















  <style>
    * {
      margin: 0;
      padding: 0;
    }







    /* Style the scrollbar for WebKit browsers (Chrome, Safari) */
    ::-webkit-scrollbar {
      width: 12px;
    }

    /* Track */
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    /* Handle */
    ::-webkit-scrollbar-thumb {
      background: #888;
    }

    /* Handle on hover */
    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }




    body {
      background-color: black;
    }








    /* Globally remove text decoration from links */
    a {
      text-decoration: none;
      /* Removes underline */
    }

    /* Specific to card links */
    .card a:hover {
      text-decoration: none;
      /* This ensures no underline appears on hover */
    }

    /* Additional card hover effects */
    .card:hover {
      text-decoration: none;
      transform: scale(1.05);
      /* Scale the card on hover */
      box-shadow: 0 4px 8px rgba(43, 0, 213, 0.661);
      /* Add shadow on hover */
    }

    .card {
      cursor: pointer;
      height: 23vh;
      border: 2px solid white;
      border-radius: 5px;
      transition: all 0.3s ease;
      background-color: black;
    }

    .card:hover {
      text-decoration: none;
      transform: scale(1.05);
      /* Scale the card on hover */
      box-shadow: 0 4px 8px rgba(43, 0, 213, 0.661);
      /* Add shadow on hover */
    }

    .card-title {
      color: crimson;
      /* Blue text */
      font-size: 50px;
      font-weight: bold;
    }

    .card-text {
      color: white;
      /* Black text */
      font-size: 20px;
    }

    .card-body {
      height: 100%;
      /* Set desired height */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;

    }


    /* Style the scrollbar for WebKit browsers (Chrome, Safari) */
    ::-webkit-scrollbar {
      width: 12px;
    }

    /* Track */
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    /* Handle */
    ::-webkit-scrollbar-thumb {
      background: #888;
    }

    /* Handle on hover */
    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }
  </style>
</body>

</html>
