<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery with Slideshow</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="gallery">
        <div class="thumbnails">
            <img src="image1.jpg" alt="Thumbnail 1" class="thumbnail" onclick="currentSlide(1)">
            <img src="image2.jpg" alt="Thumbnail 2" class="thumbnail" onclick="currentSlide(2)">
            <img src="image3.jpg" alt="Thumbnail 3" class="thumbnail" onclick="currentSlide(3)">
        </div>
        <div class="slideshow">
            <img src="image1.jpg" alt="Slide 1" class="slide">
            <img src="image2.jpg" alt="Slide 2" class="slide">
            <img src="image3.jpg" alt="Slide 3" class="slide">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
